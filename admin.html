<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parlay Bot — Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .admin-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-back {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .admin-back:hover {
            color: var(--text-primary);
        }

        /* Quick Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card, rgba(20, 24, 40, 0.6));
            border: 1px solid var(--border-color, rgba(255, 255, 255, 0.06));
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card-value {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* Users Table */
        .admin-search {
            width: 100%;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            margin-bottom: 16px;
            font-family: inherit;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .users-table th {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .users-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-secondary, rgba(255, 255, 255, 0.8));
        }

        .users-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .users-table .tier-cell {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }

        .admin-action-btn {
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary, rgba(255, 255, 255, 0.8));
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-right: 4px;
            font-family: inherit;
        }

        .admin-action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .admin-action-btn.grant {
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }

        .admin-action-btn.revoke {
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .admin-action-btn.admin-toggle {
            border-color: rgba(168, 85, 247, 0.3);
            color: #c084fc;
        }

        .admin-denied {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
            color: var(--text-muted, rgba(255, 255, 255, 0.4));
            font-size: 1.1rem;
        }

        .admin-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: var(--text-muted, rgba(255, 255, 255, 0.4));
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }

        .pagination button {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: default;
        }
    </style>
</head>

<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div id="admin-loading" class="admin-loading">Loading...</div>
    <div id="admin-denied" class="admin-denied" style="display:none;">
        <div>
            <div style="font-size: 2rem; margin-bottom: 12px;">🔒</div>
            <p>Admin access required.</p>
            <a href="index.html" style="color: #60a5fa; margin-top: 12px; display: inline-block;">← Back to Parlay
                Bot</a>
        </div>
    </div>

    <div id="admin-app" style="display: none;">
        <div class="admin-container">
            <div class="admin-header">
                <h1>⚙️ Admin Dashboard</h1>
                <a href="index.html" class="admin-back">← Back to App</a>
            </div>

            <!-- Stats -->
            <div class="stats-row" id="admin-stats"></div>

            <!-- User Management -->
            <h2 style="font-size: 1.1rem; margin-bottom: 12px; font-weight: 700;">User Management</h2>
            <input type="text" class="admin-search" id="user-search" placeholder="Search by email or name..."
                oninput="filterUsers()">

            <div style="overflow-x: auto;">
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Name</th>
                            <th>Tier</th>
                            <th>Status</th>
                            <th>Granted</th>
                            <th>Admin</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody"></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://civkjfswgtvjxxqquxqb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpdmtqZnN3Z3R2anh4cXF1eHFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjAzMTcsImV4cCI6MjA4ODMzNjMxN30.3ZB2UwBLXjXY8KPZGAo1vLs39_rhzZ6Jt4l_MhuSwhs';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Hardcoded admin override — same as app.js
        const SITE_ADMINS = ['f4128156-bc33-475c-b715-30120b0fb35b'];

        let allUsers = [];
        let filteredUsers = [];
        let currentPage = 0;
        const PAGE_SIZE = 25;
        let adminProfile = null;

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { showDenied(); return; }

            // Hardcoded admin check — bypass RLS
            const isSiteAdmin = SITE_ADMINS.includes(session.user.id);

            const { data: profile } = await sb
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();

            if (!isSiteAdmin && (!profile || !profile.is_admin)) { showDenied(); return; }
            adminProfile = profile || { id: session.user.id, email: session.user.email, is_admin: true };

            document.getElementById('admin-loading').style.display = 'none';
            document.getElementById('admin-app').style.display = 'block';

            await loadUsers();
            renderStats();
            renderUsers();
        }

        function showDenied() {
            document.getElementById('admin-loading').style.display = 'none';
            document.getElementById('admin-denied').style.display = 'flex';
        }

        async function loadUsers() {
            const { data, error } = await sb
                .from('profiles')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) { console.error(error); return; }
            allUsers = data || [];
            filteredUsers = allUsers;
        }

        function renderStats() {
            const total = allUsers.length;
            const free = allUsers.filter(u => (u.granted_tier || u.subscription_tier) === 'free' || (!u.subscription_tier)).length;
            const plus = allUsers.filter(u => (u.granted_tier || u.subscription_tier) === 'plus').length;
            const pro = allUsers.filter(u => (u.granted_tier || u.subscription_tier) === 'pro').length;
            const admins = allUsers.filter(u => u.is_admin).length;

            document.getElementById('admin-stats').innerHTML = `
            <div class="stat-card"><div class="stat-card-value">${total}</div><div class="stat-card-label">Total Users</div></div>
            <div class="stat-card"><div class="stat-card-value">${free}</div><div class="stat-card-label">Free Tier</div></div>
            <div class="stat-card"><div class="stat-card-value">${plus}</div><div class="stat-card-label">Plus Tier</div></div>
            <div class="stat-card"><div class="stat-card-value">${pro}</div><div class="stat-card-label">Pro Tier</div></div>
            <div class="stat-card"><div class="stat-card-value">${admins}</div><div class="stat-card-label">Admins</div></div>
        `;
        }

        function filterUsers() {
            const q = document.getElementById('user-search').value.toLowerCase().trim();
            filteredUsers = q
                ? allUsers.filter(u => (u.email || '').toLowerCase().includes(q) || (u.display_name || '').toLowerCase().includes(q))
                : allUsers;
            currentPage = 0;
            renderUsers();
        }

        function renderUsers() {
            const start = currentPage * PAGE_SIZE;
            const page = filteredUsers.slice(start, start + PAGE_SIZE);
            const tbody = document.getElementById('users-tbody');

            tbody.innerHTML = page.map(u => {
                const effectTier = u.granted_tier || u.subscription_tier || 'free';
                const tierColor = effectTier === 'pro' ? '#c084fc' : effectTier === 'plus' ? '#60a5fa' : '#94a3b8';
                const joined = u.created_at ? new Date(u.created_at).toLocaleDateString() : '—';
                const status = u.subscription_status || 'inactive';
                return `<tr>
                <td>${u.email || '—'}</td>
                <td>${u.display_name || '—'}</td>
                <td class="tier-cell" style="color: ${tierColor}">${effectTier}</td>
                <td>${status}</td>
                <td>${u.granted_tier ? '✅ ' + u.granted_tier : '—'}</td>
                <td>${u.is_admin ? '👑' : '—'}</td>
                <td>${joined}</td>
                <td>
                    <button class="admin-action-btn grant" onclick="grantTier('${u.id}', 'plus')" title="Grant Plus">+Plus</button>
                    <button class="admin-action-btn grant" onclick="grantTier('${u.id}', 'pro')" title="Grant Pro">+Pro</button>
                    <button class="admin-action-btn revoke" onclick="revokeTier('${u.id}')" title="Revoke Grant">Revoke</button>
                    <button class="admin-action-btn admin-toggle" onclick="toggleAdmin('${u.id}', ${!u.is_admin})">${u.is_admin ? '−Admin' : '+Admin'}</button>
                </td>
            </tr>`;
            }).join('');

            const totalPages = Math.ceil(filteredUsers.length / PAGE_SIZE);
            document.getElementById('pagination').innerHTML = `
            <button onclick="changePage(-1)" ${currentPage === 0 ? 'disabled' : ''}>← Prev</button>
            <span style="font-size:0.85rem; color: rgba(255,255,255,0.5);">Page ${currentPage + 1} of ${Math.max(totalPages, 1)}</span>
            <button onclick="changePage(1)" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
        `;
        }

        function changePage(dir) {
            currentPage += dir;
            renderUsers();
        }

        async function grantTier(uid, tier) {
            if (!confirm(`Grant ${tier.toUpperCase()} tier to this user?`)) return;
            const { error } = await sb
                .from('profiles')
                .update({
                    granted_tier: tier,
                    granted_by: adminProfile.id,
                    granted_at: new Date().toISOString()
                })
                .eq('id', uid);
            if (error) { alert('Error: ' + error.message); return; }
            await loadUsers();
            renderStats();
            renderUsers();
        }

        async function revokeTier(uid) {
            if (!confirm('Revoke granted tier from this user?')) return;
            const { error } = await sb
                .from('profiles')
                .update({ granted_tier: null, granted_by: null, granted_at: null })
                .eq('id', uid);
            if (error) { alert('Error: ' + error.message); return; }
            await loadUsers();
            renderStats();
            renderUsers();
        }

        async function toggleAdmin(uid, makeAdmin) {
            const action = makeAdmin ? 'promote to admin' : 'remove admin access from';
            if (!confirm(`Are you sure you want to ${action} this user?`)) return;
            const { error } = await sb
                .from('profiles')
                .update({ is_admin: makeAdmin })
                .eq('id', uid);
            if (error) { alert('Error: ' + error.message); return; }
            await loadUsers();
            renderStats();
            renderUsers();
        }

        init();
    </script>
</body>

</html>
