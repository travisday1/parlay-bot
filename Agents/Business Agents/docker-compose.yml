services:
  n8n:
    image: n8nio/n8n:latest
    container_name: day4ai-n8n
    restart: unless-stopped
    ports:
      - '5678:5678'
    env_file: .env
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=https://agents.day4ai.tech/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - GENERIC_TIMEZONE=America/Los_Angeles
      - TZ=America/Los_Angeles
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - day4ai

  postgres:
    image: postgres:16-alpine
    container_name: day4ai-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U n8n']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - day4ai

  qdrant:
    image: qdrant/qdrant:latest
    container_name: day4ai-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - day4ai

  discord-bot:
    build: ./discord-bot
    container_name: day4ai-discord-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/agent-chat
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=n8n
      - DB_USER=n8n
      - OWNER_DISCORD_ID=1477419253257732159
    volumes:
      - ./docker-compose.yml:/config/docker-compose.yml:ro
      - ./.env:/config/.env:ro
      - ./firestore.rules:/config/firestore.rules:ro
      - ./.gitignore:/config/.gitignore:ro
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started
    networks:
      - day4ai

volumes:
  n8n_data:
  postgres_data:
  qdrant_data:

networks:
  day4ai:
    driver: bridge
